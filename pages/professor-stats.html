<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estatísticas da Turma - CiberHeróis</title>
    <link rel="icon" type="image/x-icon" href="img/favicon.svg">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="dark-mode.css">
    <link rel="stylesheet" href="preloader.css">
    <link rel="stylesheet" href="gestao.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="theme.js"></script>
    <script src="global-init.js"></script>
    <style>
        /* ── Layout ── */
        .stats-container { max-width: 1100px; margin: 0 auto; padding: 30px 20px 60px; }
        .stats-header { margin-bottom: 28px; }
        .stats-header h1 { font-size: 1.7rem; font-weight: 800; color: var(--text-color); margin: 0 0 4px; }
        .stats-header p  { color: var(--text-secondary); margin: 0; }

        /* ── Controls bar ── */
        .stats-controls {
            display: flex; gap: 14px; flex-wrap: wrap; align-items: flex-end;
            background: var(--bg-card); border: 1px solid var(--border-color);
            border-radius: 14px; padding: 18px 20px; margin-bottom: 28px;
        }
        .stats-controls .ctrl-group { display: flex; flex-direction: column; gap: 5px; }
        .stats-controls label { font-size: 0.78rem; font-weight: 700; color: var(--text-secondary); text-transform: uppercase; letter-spacing: .04em; }
        .stats-select {
            height: 40px; padding: 0 14px; border-radius: 10px;
            border: 2px solid var(--border-color); background: var(--bg-secondary);
            color: var(--text-color); font-size: 0.9rem; font-weight: 600; cursor: pointer;
            min-width: 200px; transition: border-color .2s;
        }
        .stats-select:focus { outline: none; border-color: #10b981; }

        /* ── Summary cards ── */
        .stats-cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px,1fr)); gap: 16px; margin-bottom: 28px; }
        .stat-card {
            background: var(--bg-card); border: 1px solid var(--border-color);
            border-radius: 14px; padding: 20px 18px; display: flex; flex-direction: column; gap: 8px;
            transition: transform .2s, box-shadow .2s;
        }
        .stat-card:hover { transform: translateY(-3px); box-shadow: 0 8px 24px rgba(0,0,0,.08); }
        .stat-card-icon { width: 38px; height: 38px; border-radius: 10px; display: flex; align-items: center; justify-content: center; }
        .stat-card-icon i { width: 20px; height: 20px; }
        .stat-card-value { font-size: 1.9rem; font-weight: 800; color: var(--text-color); line-height: 1; }
        .stat-card-label { font-size: 0.8rem; font-weight: 600; color: var(--text-secondary); }

        /* ── Table ── */
        .stats-table-wrap { overflow-x: auto; border-radius: 14px; border: 1px solid var(--border-color); }
        .stats-table { width: 100%; border-collapse: collapse; }
        .stats-table th {
            padding: 13px 16px; font-size: 0.78rem; font-weight: 700; text-transform: uppercase;
            letter-spacing: .04em; color: var(--text-secondary); background: var(--bg-secondary);
            text-align: left; border-bottom: 1px solid var(--border-color); white-space: nowrap;
        }
        .stats-table td {
            padding: 14px 16px; border-bottom: 1px solid var(--border-color);
            font-size: 0.9rem; color: var(--text-color); vertical-align: middle;
        }
        .stats-table tr:last-child td { border-bottom: none; }
        .stats-table tbody tr { transition: background .15s; }
        .stats-table tbody tr:hover { background: var(--bg-secondary); }

        /* Avatar cell */
        .aluno-cell { display: flex; align-items: center; gap: 10px; }
        .aluno-avatar { width: 36px; height: 36px; border-radius: 50%; object-fit: cover; border: 2px solid var(--border-color); }
        .aluno-nome { font-weight: 700; }
        .aluno-nivel { font-size: 0.78rem; color: var(--text-secondary); }

        /* Precision bar */
        .precisao-wrap { display: flex; align-items: center; gap: 10px; min-width: 130px; }
        .precisao-bar-bg { flex: 1; height: 7px; background: var(--bg-secondary); border-radius: 99px; overflow: hidden; }
        .precisao-bar { height: 100%; border-radius: 99px; transition: width .6s ease; }
        .precisao-txt { font-weight: 700; font-size: 0.85rem; min-width: 36px; text-align: right; }

        /* Streak badge */
        .streak-badge {
            display: inline-flex; align-items: center; gap: 4px;
            padding: 3px 10px; border-radius: 99px; font-size: 0.8rem; font-weight: 700;
            background: rgba(245,158,11,.12); color: #d97706;
        }
        .streak-badge.zero { background: var(--bg-secondary); color: var(--text-secondary); }

        /* Date pill */
        .date-pill { font-size: 0.8rem; color: var(--text-secondary); white-space: nowrap; }

        /* Empty/loading */
        .stats-empty { text-align: center; padding: 60px 20px; color: var(--text-secondary); }
        .stats-empty i { width: 52px; height: 52px; opacity: .35; margin-bottom: 14px; }
        .skeleton-row { height: 56px; background: linear-gradient(90deg, var(--bg-card) 25%, var(--bg-secondary) 50%, var(--bg-card) 75%); background-size: 200% 100%; animation: shimmer 1.3s infinite; }
        @keyframes shimmer { to { background-position: -200% 0; } }

        @media (max-width: 640px) {
            .stats-cards { grid-template-columns: 1fr 1fr; }
            .stats-controls { flex-direction: column; }
        }
    </style>
</head>
<body class="site-body">
    <div id="global-loader">
        <div class="loader-logo">Ciber<span>Heróis</span></div>
        <div class="loader-spinner"></div>
    </div>

    <!-- Navbar -->
    <nav class="auth-navbar">
        <div class="auth-navbar-inner">
            <div class="auth-navbar-left">
                <a href="quizzes" class="auth-brand">CiberHeróis | <span style="color: #10b981;">Professor</span></a>
            </div>

            <div class="auth-navbar-right">
                <button class="auth-navbar-btn" id="theme-toggle" title="Mudar Tema">
                    <i data-lucide="sun" class="auth-navbar-icon"></i>
                </button>
                <a href="professor" class="auth-navbar-btn" title="Painel do Professor">
                    <i data-lucide="layout-dashboard" class="auth-navbar-icon"></i>
                </a>
                <a href="profile" class="auth-navbar-btn" title="Ver Perfil">
                    <i data-lucide="user" class="auth-navbar-icon"></i>
                </a>
                <button onclick="window.fazerLogout()" class="auth-navbar-btn auth-navbar-logout" title="Sair">
                    <i data-lucide="log-out" class="auth-navbar-icon"></i>
                </button>
                <a href="quizzes" class="btn btn-secondary" style="margin-left: 10px;">Voltar aos Quizzes</a>
            </div>

        </div>
    </nav>

    <div class="stats-container">
        <!-- Header -->
        <div class="stats-header">
            <h1><i data-lucide="bar-chart-2" style="width:28px;height:28px;vertical-align:middle;margin-right:8px;color:#10b981;"></i>Estatísticas das Turmas</h1>
            <p>Acompanha o progresso dos teus heróis em detalhe</p>
        </div>

        <!-- Controls -->
        <div class="stats-controls">
            <div class="ctrl-group">
                <label for="sel-turma">Turma</label>
                <select id="sel-turma" class="stats-select" onchange="onFiltroChange()">
                    <option value="">— Seleciona uma turma —</option>
                </select>
            </div>
            <div class="ctrl-group">
                <label for="sel-periodo">Período</label>
                <select id="sel-periodo" class="stats-select" onchange="onFiltroChange()">
                    <option value="sempre">📅 Todo o tempo</option>
                    <option value="ano">📆 Este ano</option>
                    <option value="mes">🗓️ Este mês</option>
                    <option value="semana">📊 Esta semana</option>
                </select>
            </div>
        </div>

        <!-- Summary cards -->
        <div class="stats-cards" id="stats-cards" style="display:none;">
            <div class="stat-card">
                <div class="stat-card-icon" style="background:rgba(16,185,129,.12);">
                    <i data-lucide="users" style="color:#10b981;"></i>
                </div>
                <div class="stat-card-value" id="card-alunos">—</div>
                <div class="stat-card-label">Alunos na Turma</div>
            </div>
            <div class="stat-card">
                <div class="stat-card-icon" style="background:rgba(99,102,241,.12);">
                    <i data-lucide="zap" style="color:#6366f1;"></i>
                </div>
                <div class="stat-card-value" id="card-ativos">—</div>
                <div class="stat-card-label">Alunos Ativos</div>
            </div>
            <div class="stat-card">
                <div class="stat-card-icon" style="background:rgba(245,158,11,.12);">
                    <i data-lucide="target" style="color:#f59e0b;"></i>
                </div>
                <div class="stat-card-value" id="card-precisao">—</div>
                <div class="stat-card-label">Precisão Média</div>
            </div>
            <div class="stat-card">
                <div class="stat-card-icon" style="background:rgba(59,130,246,.12);">
                    <i data-lucide="book-open" style="color:#3b82f6;"></i>
                </div>
                <div class="stat-card-value" id="card-quizzes">—</div>
                <div class="stat-card-label">Quizzes Feitos</div>
            </div>
            <div class="stat-card" id="card-melhor-wrap">
                <div class="stat-card-icon" style="background:rgba(234,179,8,.12);">
                    <i data-lucide="award" style="color:#eab308;"></i>
                </div>
                <div class="stat-card-value" id="card-melhor" style="font-size:1.1rem;line-height:1.3;">—</div>
                <div class="stat-card-label">Melhor Herói</div>
            </div>
        </div>

        <!-- Table -->
        <div id="table-area">
            <div class="stats-empty">
                <i data-lucide="mouse-pointer-click"></i>
                <p>Seleciona uma turma para ver as estatísticas</p>
            </div>
        </div>
    </div>

    <script>
        lucide.createIcons();

        async function carregarTurmas() {
            try {
                const res = await fetch('/api/professor/stats/turmas');
                if (!res.ok) { if (res.status === 401) window.location.href = 'index'; return; }
                const turmas = await res.json();
                const sel = document.getElementById('sel-turma');
                if (turmas.length === 0) {
                    sel.innerHTML = '<option value="">Sem turmas disponíveis</option>';
                    return;
                }
                turmas.forEach(t => {
                    const o = document.createElement('option');
                    o.value = t.id_turma;
                    o.textContent = `${t.nome} (${t.ano_letivo || '—'})`;
                    sel.appendChild(o);
                });
                // Auto-selecionar primeira turma
                if (turmas.length > 0) {
                    sel.value = turmas[0].id_turma;
                    await carregarStats();
                }
            } catch (e) { console.error(e); }
        }

        async function onFiltroChange() {
            const idTurma = document.getElementById('sel-turma').value;
            if (!idTurma) return;
            await carregarStats();
        }

        async function carregarStats() {
            const idTurma = document.getElementById('sel-turma').value;
            const periodo = document.getElementById('sel-periodo').value;
            if (!idTurma) return;

            // Skeleton table
            document.getElementById('table-area').innerHTML = `
                <div class="stats-table-wrap">
                    <table class="stats-table">
                        <thead><tr>
                            <th>Aluno</th><th>Pontos</th><th>Quizzes</th>
                            <th>Certas</th><th>Erradas</th><th>Precisão</th>
                            <th>🔥 Streak</th><th>Última Atividade</th>
                        </tr></thead>
                        <tbody>
                            ${Array(5).fill('<tr><td colspan="8"><div class="skeleton-row" style="border-radius:6px;"></div></td></tr>').join('')}
                        </tbody>
                    </table>
                </div>`;

            try {
                const res = await fetch(`/api/professor/stats/turma/${idTurma}?periodo=${periodo}`);
                if (!res.ok) throw new Error('Erro ao carregar stats');
                const { resumo, alunos } = await res.json();

                // Preencher cards
                document.getElementById('stats-cards').style.display = 'grid';
                document.getElementById('card-alunos').textContent   = resumo.total_alunos;
                document.getElementById('card-ativos').textContent   = resumo.alunos_ativos;
                document.getElementById('card-precisao').textContent = resumo.media_precisao + '%';
                document.getElementById('card-quizzes').textContent  = resumo.total_quizzes;
                document.getElementById('card-melhor').textContent   = resumo.melhor_aluno
                    ? `${resumo.melhor_aluno.nome.split(' ')[0]} · ${resumo.melhor_aluno.pontos.toLocaleString('pt-PT')} pts`
                    : '—';
                lucide.createIcons();

                // Tabela
                if (alunos.length === 0) {
                    document.getElementById('table-area').innerHTML = `
                        <div class="stats-empty">
                            <i data-lucide="users"></i>
                            <p>Nenhum aluno nesta turma${periodo !== 'sempre' ? ' no período selecionado' : ''}.</p>
                        </div>`;
                    lucide.createIcons();
                    return;
                }

                const rows = alunos.map((a, i) => {
                    const precColor = a.precisao >= 70 ? '#10b981' : a.precisao >= 40 ? '#f59e0b' : '#ef4444';
                    const ultimaData = a.ultima_atividade
                        ? new Date(a.ultima_atividade).toLocaleDateString('pt-PT', { day:'2-digit', month:'short', year:'numeric' })
                        : '—';
                    const avatarSrc = a.avatar || '/img/default_avatar.png';
                    return `<tr style="animation: rankFadeIn .3s ease ${i * 0.04}s both;">
                        <td>
                            <div class="aluno-cell">
                                <img src="${avatarSrc}" alt="" class="aluno-avatar" referrerpolicy="no-referrer" onerror="this.src='/img/default_avatar.png'">
                                <div>
                                    <div class="aluno-nome">${a.nome}</div>
                                    <div class="aluno-nivel">Nível ${a.nivel}</div>
                                </div>
                            </div>
                        </td>
                        <td><strong style="color:var(--primary-color);">${a.pontos.toLocaleString('pt-PT')}</strong></td>
                        <td><strong>${a.total_quizzes}</strong></td>
                        <td style="color:#10b981;font-weight:700;">${a.respostas_corretas}</td>
                        <td style="color:#ef4444;font-weight:700;">${a.respostas_erradas}</td>
                        <td>
                            <div class="precisao-wrap">
                                <div class="precisao-bar-bg">
                                    <div class="precisao-bar" style="width:${a.precisao}%;background:${precColor};"></div>
                                </div>
                                <span class="precisao-txt" style="color:${precColor};">${a.precisao}%</span>
                            </div>
                        </td>
                        <td>
                            <span class="streak-badge ${a.streak === 0 ? 'zero' : ''}">
                                🔥 ${a.streak}d
                            </span>
                        </td>
                        <td><span class="date-pill">${ultimaData}</span></td>
                    </tr>`;
                }).join('');

                document.getElementById('table-area').innerHTML = `
                    <div class="stats-table-wrap">
                        <table class="stats-table">
                            <thead><tr>
                                <th>Aluno</th><th>Pontos</th><th>Quizzes</th>
                                <th>✅ Certas</th><th>❌ Erradas</th><th>Precisão</th>
                                <th>🔥 Streak</th><th>Última Atividade</th>
                            </tr></thead>
                            <tbody>${rows}</tbody>
                        </table>
                    </div>`;

                // Injetar keyframe no documento se não existe
                if (!document.getElementById('stats-kf')) {
                    const s = document.createElement('style');
                    s.id = 'stats-kf';
                    s.textContent = '@keyframes rankFadeIn { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }';
                    document.head.appendChild(s);
                }

            } catch (e) {
                console.error(e);
                document.getElementById('table-area').innerHTML = `
                    <div class="stats-empty" style="color:#ef4444;">
                        <i data-lucide="alert-triangle"></i>
                        <p>Erro ao carregar as estatísticas.</p>
                    </div>`;
                lucide.createIcons();
            }
        }

        document.addEventListener('DOMContentLoaded', carregarTurmas);
    </script>
</body>
</html>
