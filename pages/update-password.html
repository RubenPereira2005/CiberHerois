<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nova Palavra-passe - CiberHeróis</title>
    <link rel="icon" type="image/x-icon" href="img/favicon.svg">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="dark-mode.css">
    <link rel="stylesheet" href="preloader.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="theme.js"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script src="global-init.js"></script>
</head>
<body class="login-page">
    
    <div id="global-loader">
        <div class="loader-logo">Ciber<span>Heróis</span></div>
        <div class="loader-spinner"></div>
    </div>

    <div id="toast-container" class="toast-container">
        <div class="toast-content">
            <i id="toast-icon-element" data-lucide="alert-circle" class="toast-icon"></i>
            <span id="toast-message-element" class="toast-message">Mensagem aqui</span>
        </div>
        <div class="toast-progress"></div>
    </div>

    <div class="login-wrapper">
        <div class="login-box">
            <div class="login-header">
                <h2 class="login-title">CiberHeróis</h2>
            </div>

            <h3 class="login-subtitle">Criar Nova Palavra-passe</h3>
            
            <form id="updatePasswordForm" class="login-form">
                
                <div class="form-group">
                    <label class="form-label">Nova Palavra-passe</label>
                    <div class="password-input-wrapper">
                        <input type="password" id="newPassword" required class="form-input" placeholder="••••••••" autocomplete="new-password" />
                        <button type="button" onclick="toggleVisibility('newPassword')" class="password-toggle-btn">
                            <i data-lucide="eye" class="icon-eye"></i>
                        </button>
                        
                        <div id="passwordRequirements" class="password-requirements">
                            <p class="requirements-title">A sua palavra-passe deve conter:</p>
                            <div class="requirement-item" id="req-length"><span>Pelo menos 8 caracteres</span></div>
                            <div class="requirement-item" id="req-upper"><span>Uma letra maiúscula</span></div>
                            <div class="requirement-item" id="req-number"><span>Um número</span></div>
                            <div class="requirement-item" id="req-symbol"><span>Um símbolo (@, #, $, etc.)</span></div>
                        </div>
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label">Confirmar Palavra-passe</label>
                    <div class="password-input-wrapper">
                        <input type="password" id="confirmPassword" required class="form-input" placeholder="••••••••" />
                        <button type="button" onclick="toggleVisibility('confirmPassword')" class="password-toggle-btn">
                            <i data-lucide="eye" class="icon-eye"></i>
                        </button>
                    </div>
                </div>

                <button type="submit" id="submitBtn" class="login-btn">Atualizar Palavra-passe</button>
            </form>
        </div>
    </div>

    <script>
        lucide.createIcons();

        // COLOCA AQUI AS TUAS CHAVES
        const supabaseUrl = 'https://xpmdiqqbgpzdditkbuzz.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhwbWRpcXFiZ3B6ZGRpdGtidXp6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI2NDY5MzMsImV4cCI6MjA4ODIyMjkzM30.mwWcvrNrnLO_EjgbY9V1Ozdcfs9SBk0S4nWKxagiuUU';
        const db = supabase.createClient(supabaseUrl, supabaseKey);

        const passwordInput = document.getElementById('newPassword');
        const confirmPasswordInput = document.getElementById('confirmPassword');
        const requirementsBox = document.getElementById('passwordRequirements');
        const toastContainer = document.getElementById('toast-container');
        const toastMessage = document.getElementById('toast-message-element');
        const toastIcon = document.getElementById('toast-icon-element');
        
        function showToast(mensagem, tipo = 'error') {
            toastMessage.textContent = mensagem;
            toastContainer.className = `toast-container active ${tipo}`;
            const iconName = tipo === 'success' ? 'check-circle' : 'alert-circle';
            toastIcon.setAttribute('data-lucide', iconName);
            lucide.createIcons();
            setTimeout(() => { toastContainer.classList.remove('active'); }, 4000);
        }

        // Lógica de Requisitos de Password (Igual ao Registo)
        const criteria = {
            length: (val) => val.length >= 8,
            upper: (val) => /[A-Z]/.test(val),
            number: (val) => /[0-9]/.test(val),
            symbol: (val) => /[^A-Za-z0-9]/.test(val)
        };

        passwordInput.addEventListener('focus', () => requirementsBox.style.display = 'block');
        passwordInput.addEventListener('blur', () => requirementsBox.style.display = 'none');
        passwordInput.addEventListener('input', () => {
            const val = passwordInput.value;
            Object.keys(criteria).forEach(key => {
                const element = document.getElementById(`req-${key}`);
                element.classList.toggle('valid', criteria[key](val));
            });
        });

        // Alternar visualização (Olho)
        function toggleVisibility(inputId) {
            const input = document.getElementById(inputId);
            input.type = input.type === "password" ? "text" : "password";
        }

        // Submissão
        document.getElementById('updatePasswordForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const val = passwordInput.value;
            const btn = document.getElementById('submitBtn');

            // 1. Validar requisitos
            if (!Object.values(criteria).every(test => test(val))) {
                return showToast('A palavra-passe não cumpre os requisitos mínimos.', 'error');
            }
            
            // 2. Validar coincidência
            if (val !== confirmPasswordInput.value) {
                return showToast('As palavras-passe não coincidem.', 'error');
            }

            btn.textContent = "A atualizar...";
            btn.disabled = true;

            try {
                // 3. Enviar para o Supabase
                const { data, error } = await db.auth.updateUser({
                    password: val
                });

                if (error) {
                    showToast(error.message, 'error');
                    btn.textContent = "Atualizar Palavra-passe";
                    btn.disabled = false;
                } else {
                    showToast('Palavra-passe atualizada com sucesso!', 'success');
                    setTimeout(() => { window.location.href = 'login.html'; }, 2000);
                }
            } catch (err) {
                showToast("Erro ao comunicar com o servidor.", 'error');
                btn.textContent = "Atualizar Palavra-passe";
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
