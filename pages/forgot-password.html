<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuperar Palavra-passe - CiberHeróis</title>
    <link rel="icon" type="image/x-icon" href="img/favicon.svg">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="dark-mode.css">
    <link rel="stylesheet" href="preloader.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="theme.js"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script src="global-init.js"></script>
</head>
<body class="login-page">
    
    <div id="global-loader">
        <div class="loader-logo">Ciber<span>Heróis</span></div>
        <div class="loader-spinner"></div>
    </div>

    <div id="toast-container" class="toast-container">
        <div class="toast-content">
            <i id="toast-icon-element" data-lucide="alert-circle" class="toast-icon"></i>
            <span id="toast-message-element" class="toast-message">Mensagem aqui</span>
        </div>
        <div class="toast-progress"></div>
    </div>

    <div class="login-wrapper">
        <div class="login-box">
            <div class="login-header">
                <h2 class="login-title">CiberHeróis</h2>
            </div>

            <h3 class="login-subtitle">Recuperar Palavra-passe</h3>
            <p style="text-align: center; color: var(--text-secondary); margin-bottom: 20px; font-size: 0.9rem;">
                Insere o teu e-mail e enviaremos um link seguro.
            </p>
            
            <form id="forgotPasswordForm" class="login-form">
                <div class="form-group">
                    <label class="form-label">Email</label>
                    <input type="email" id="resetEmail" required class="form-input" placeholder="exemplo@email.com" />
                </div>

                <button type="submit" id="submitBtn" class="login-btn">Enviar E-mail</button>

                <p class="back-link" style="margin-top: 20px;">
                    <i data-lucide="arrow-left"></i>
                    <a href="login.html" class="link-highlight">Voltar ao Login</a>
                </p>
            </form>
        </div>
    </div>

    <script>
        lucide.createIcons();

        // COLOCA AQUI AS TUAS CHAVES
        const supabaseUrl = 'https://xpmdiqqbgpzdditkbuzz.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhwbWRpcXFiZ3B6ZGRpdGtidXp6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI2NDY5MzMsImV4cCI6MjA4ODIyMjkzM30.mwWcvrNrnLO_EjgbY9V1Ozdcfs9SBk0S4nWKxagiuUU';
        const db = supabase.createClient(supabaseUrl, supabaseKey);

        const toastContainer = document.getElementById('toast-container');
        const toastMessage = document.getElementById('toast-message-element');
        const toastIcon = document.getElementById('toast-icon-element');

        function showToast(mensagem, tipo = 'error') {
            toastMessage.textContent = mensagem;
            toastContainer.className = `toast-container active ${tipo}`;
            const iconName = tipo === 'success' ? 'check-circle' : 'alert-circle';
            toastIcon.setAttribute('data-lucide', iconName);
            lucide.createIcons();
            setTimeout(() => { toastContainer.classList.remove('active'); }, 4000);
        }

        document.getElementById('forgotPasswordForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('resetEmail').value;
            const btn = document.getElementById('submitBtn');
            
            btn.textContent = "A enviar...";
            btn.disabled = true;

            try {
                const { data, error } = await db.auth.resetPasswordForEmail(email, {
                    redirectTo: window.location.origin + '/update-password.html',
                });

                if (error) {
                    showToast(error.message, 'error');
                } else {
                    showToast('E-mail enviado! Verifica a tua caixa de entrada.', 'success');
                    document.getElementById('resetEmail').value = '';
                }
            } catch (err) {
                showToast("Erro ao comunicar com o servidor.", 'error');
            } finally {
                btn.textContent = "Enviar E-mail";
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
