<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuperar Password - CiberHeróis</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="login-page">

    <div id="toast" class="toast-container success">
        <div class="toast-content">
            <i data-lucide="check-circle" class="toast-icon-reset"></i>
            <span class="toast-message">Email enviado com sucesso (se a conta existir).</span>
        </div>
        <div class="toast-progress"></div>
    </div>

    <div class="login-wrapper">
        <div class="login-box">
            <div class="login-header">
                <h2 class="login-title">CiberHeróis</h2>
            </div>

            <h3 class="login-subtitle">Recuperar palavra-passe</h3>
            <p style="color: #4b5563; font-size: 14px; text-align: center; margin-bottom: 24px;">
                Introduz o teu e-mail para receberes as instruções de recuperação.
            </p>
            
            <form id="forgotForm" class="login-form">
                <div class="form-group">
                    <label class="form-label">Email</label>
                    <input type="email" id="recoveryEmail" required class="form-input" placeholder="exemplo@email.com" />
                </div>

                <button type="submit" class="login-btn">Enviar Instruções</button>

                <p class="login-link">
                    <a href="login.html" class="link-highlight">Voltar ao login</a>
                </p>
            </form>
        </div>
    </div>

    <script>
        lucide.createIcons();

        document.getElementById('forgotForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('recoveryEmail').value;
            const toast = document.getElementById('toast');

            try {
                // Simulação da API (em localhost)
                await fetch('/api/forgot-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email })
                });

                // Ativa o teu Toast customizado (animação de 3s conforme o teu CSS)
                toast.classList.add('active');

                // Redireciona após a animação do toast terminar
                setTimeout(() => {
                    window.location.href = 'login.html';
                }, 3500);

            } catch (err) {
                // Mesmo com erro de conexão, mostramos o sucesso para testares o visual
                toast.classList.add('active');
                setTimeout(() => {
                    window.location.href = 'login.html';
                }, 3500);
            }
        });
    </script>
</body>
</html>
