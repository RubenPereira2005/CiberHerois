<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Histórico - CiberHeróis</title>
    <link rel="icon" type="image/x-icon" href="img/favicon.svg">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="dark-mode.css">
    <link rel="stylesheet" href="preloader.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="theme.js"></script>
    <script src="global-init.js"></script>
</head>
<body class="site-body">
    <div id="global-loader">
        <div class="loader-logo">Ciber<span>Heróis</span></div>
        <div class="loader-spinner"></div>
    </div>

    <div id="includedContent"></div>

    <div class="auth-container profile-main" style="max-width: 800px;">
        
        <div style="margin-bottom: 30px; display: flex; align-items: center; gap: 15px;">
            <a href="profile.html" id="btn-voltar-perfil" class="btn btn-secondary" style="display: flex; justify-content: center; align-items: center; width: 45px; height: 45px; padding: 0; border-radius: 50%; flex-shrink: 0; overflow: hidden;">
                <i data-lucide="arrow-left" style="min-width: 22px; min-height: 22px;"></i>
            </a>
            <h1 style="color: var(--text-color); margin: 0; font-size: 1.8rem;">Histórico de Atividades</h1>
        </div>

        <div class="profile-card">
            <div id="historico-container" class="profile-activity">
                <p style="color: var(--text-secondary); text-align: center; padding: 20px;">A carregar histórico...</p>
            </div>
        </div>

    </div>

    <script>
        lucide.createIcons();

        document.addEventListener('DOMContentLoaded', async () => {
            // 1. Verificar se estamos a ver o histórico de outra pessoa
            const urlParams = new URLSearchParams(window.location.search);
            const targetId = urlParams.get('id');

            // 2. Atualizar o Botão Voltar
            const btnVoltar = document.getElementById('btn-voltar-perfil');
            if (targetId) {
                btnVoltar.href = `profile.html?id=${targetId}`; // Volta para o perfil da pessoa
            } else {
                btnVoltar.href = `profile.html`; // Volta para o teu perfil
            }

            // 3. Escolher o endpoint certo para pedir à base de dados
            const endpoint = targetId ? `/api/history/${targetId}` : `/api/history`;

            try {
                const response = await fetch(endpoint);
                const container = document.getElementById('historico-container');

                if (response.status === 401) {
                    window.location.href = 'index.html';
                    return;
                }
                
                // Se o backend nos disser que o perfil é privado e não podemos ver o histórico
                if (response.status === 403) {
                    container.innerHTML = `
                        <div style="text-align: center; padding: 40px;">
                            <i data-lucide="shield-alert" style="width: 48px; height: 48px; color: #8b5cf6; margin-bottom: 15px;"></i>
                            <h3 style="margin-bottom: 10px;">Acesso Negado</h3>
                            <p style="color: var(--text-secondary);">Este ciber-herói ocultou o seu histórico de atividades.</p>
                        </div>
                    `;
                    lucide.createIcons();
                    return;
                }

                const atividades = await response.json();
                container.innerHTML = '';

                if (!atividades || atividades.length === 0) {
                    container.innerHTML = '<p style="color: var(--text-secondary); text-align: center; padding: 20px;">Ainda não há atividades registadas.</p>';
                    return;
                }

                atividades.forEach(act => {
                    const tipoNome = act.atividade.tipo === 'quiz' ? 'Quiz' : 'Jogo';
                    const dataRealizacao = new Date(act.data_realizacao);
                    
                    const opcoesData = { day: 'numeric', month: 'long', year: 'numeric', hour: '2-digit', minute:'2-digit' };
                    const textoData = dataRealizacao.toLocaleDateString('pt-PT', opcoesData);

                    let textoDescricao = 'Concluído';
                    if (act.respostas_corretas !== null && act.total_perguntas !== null && act.total_perguntas > 0) {
                        textoDescricao = `${act.respostas_corretas}/${act.total_perguntas} corretas`;
                    }

                    const itemHTML = `
                        <div class="profile-activity-item">
                            <div>
                                <div class="profile-activity-title" style="font-size: 1.1rem;">${tipoNome}: ${act.atividade.titulo}</div>
                                <div class="profile-activity-desc" style="font-size: 0.95rem;">${textoDescricao}</div>
                            </div>
                            <div class="profile-activity-right" style="text-align: right;">
                                <div class="profile-activity-points" style="font-size: 1.1rem;">+${act.pontos_obtidos} pts</div>
                                <div class="profile-activity-time">${textoData}</div>
                            </div>
                        </div>
                    `;
                    container.insertAdjacentHTML('beforeend', itemHTML);
                });

            } catch (error) {
                console.error("Erro ao carregar o histórico:", error);
                document.getElementById('historico-container').innerHTML = '<p style="color: var(--error); text-align: center; padding: 20px;">Erro ao carregar as atividades.</p>';
            }
        });
    </script>
</body>
</html>
