<!DOCTYPE html>
<html lang="pt">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sessão - CiberHeróis</title>
    <link rel="icon" type="image/x-icon" href="img/favicon.svg">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="dark-mode.css">
    <link rel="stylesheet" href="google.css">
    <link rel="stylesheet" href="preloader.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="theme.js"></script>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script src="global-init.js"></script>
    <style>
        /* Estilos do botão de Reenviar */
        #resendBtn:disabled {
            cursor: not-allowed;
            color: var(--text-secondary);
            opacity: 0.7;
        }

        #resendBtn:not(:disabled) {
            cursor: pointer;
            color: var(--primary-color);
        }

        /* Estilos das Caixinhas do Código (OTP) */
        .otp-boxes-container {
            display: flex;
            gap: 6px;
            justify-content: center;
            margin-bottom: 15px;
        }

        .otp-box {
            width: 38px;
            height: 50px;
            text-align: center;
            font-size: 1.5rem;
            font-weight: bold;
            border-radius: 8px;
            border: 2px solid rgba(148, 163, 184, 0.4);
            background: rgba(148, 163, 184, 0.1);
            color: var(--text-color);
            outline: none;
            transition: all 0.2s ease;
        }

        .otp-box:focus {
            border-color: #10b981;
            background: transparent;
            box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.2);
        }

        /* Responsividade para caberem as 8 caixas em ecrãs pequenos */
        @media (max-width: 400px) {
            .otp-box {
                width: 32px;
                height: 45px;
                font-size: 1.2rem;
                gap: 4px;
            }
        }
    </style>
</head>

<body class="login-page">
    <div id="global-loader">
        <div class="loader-logo">Ciber<span>Heróis</span></div>
        <div class="loader-spinner"></div>
    </div>

    <div class="login-wrapper">
        <div class="login-box">
            <div class="login-header">
                <h2 class="login-title">CiberHeróis</h2>
            </div>

            <h3 class="login-subtitle" id="formSubtitle">Iniciar sessão</h3>
            <p id="mfaInstructions"
                style="display: none; text-align: center; color: var(--text-secondary); font-size: 0.9rem; margin-bottom: 20px;">
                Identidade verificada! <br>Enviámos um código de 8 dígitos para o teu e-mail por motivos de segurança.
            </p>

            <form id="loginForm" class="login-form">

                <div class="form-group" id="emailGroup">
                    <label class="form-label">Email</label>
                    <input type="email" id="loginEmail" required class="form-input" placeholder="exemplo@email.com" />
                </div>

                <div class="form-group" id="passwordGroup">
                    <div style="display: flex; justify-content: space-between; align-items: center;">
                        <label class="form-label">Password</label>
                        <a href="forgot-password" class="link-highlight" style="font-size: 0.8rem;">Esqueceu-se?</a>
                    </div>
                    <div class="password-input-wrapper">
                        <input type="password" id="loginPassword" required class="form-input" placeholder="••••••••" />
                        <button type="button" onclick="toggleVisibility('loginPassword')" class="password-toggle-btn">
                            <i data-lucide="eye" class="icon-eye"></i>
                        </button>
                    </div>
                </div>

                <div class="form-group" id="codeGroup" style="display: none;">
                    <label class="form-label"
                        style="color: #10b981; text-align: left; display: block; margin-bottom: 10px;">Código de
                        Segurança (8 dígitos)</label>

                    <div class="otp-boxes-container">
                        <input type="text" class="otp-box" maxlength="1" pattern="[0-9]*" inputmode="numeric">
                        <input type="text" class="otp-box" maxlength="1" pattern="[0-9]*" inputmode="numeric">
                        <input type="text" class="otp-box" maxlength="1" pattern="[0-9]*" inputmode="numeric">
                        <input type="text" class="otp-box" maxlength="1" pattern="[0-9]*" inputmode="numeric">
                        <input type="text" class="otp-box" maxlength="1" pattern="[0-9]*" inputmode="numeric">
                        <input type="text" class="otp-box" maxlength="1" pattern="[0-9]*" inputmode="numeric">
                        <input type="text" class="otp-box" maxlength="1" pattern="[0-9]*" inputmode="numeric">
                        <input type="text" class="otp-box" maxlength="1" pattern="[0-9]*" inputmode="numeric">
                    </div>

                    <input type="hidden" id="otpCode" />
                </div>

                <button type="submit" id="submitBtn" class="login-btn">Entrar</button>

                <div id="resendContainer" style="display: none; text-align: center; margin-top: 15px;">
                    <p style="font-size: 0.85rem; color: var(--text-secondary);">
                        Não recebeste o código?
                        <button type="button" id="resendBtn" disabled
                            style="background: none; border: none; font-weight: bold; padding: 0; font-family: inherit;">
                            Reenviar em 02:00
                        </button>
                    </p>
                    <p style="margin-top: 15px;">
                        <a href="#" onclick="location.reload()" class="link-highlight" style="font-size: 0.85rem;">
                            <i data-lucide="arrow-left" style="width: 14px; height: 14px; vertical-align: middle;"></i>
                            Voltar e tentar outro e-mail
                        </a>
                    </p>
                </div>

                <div id="extraLinks">
                    <div class="divider-container">
                        <span class="divider-line"></span>
                        <span class="divider-text">ou entrar com Google</span>
                        <span class="divider-line"></span>
                    </div>

                    <div id="googleBtnContainer" style="margin-top: 14px;">
                        <div id="g_id_signin"></div>
                    </div>

                    <p class="login-link" style="margin-bottom: 15px;">
                        Novo recruta? <a href="register" class="link-highlight">Criar conta</a>
                    </p>

                    <p class="back-link">
                        <i data-lucide="arrow-left"></i>
                        <a href="index" class="link-highlight">Voltar à página inicial</a>
                    </p>
                </div>
            </form>
        </div>
    </div>

    <script>
        lucide.createIcons();

        // --- CHAVES DO SUPABASE ---
        const supabaseUrl = 'https://xpmdiqqbgpzdditkbuzz.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhwbWRpcXFiZ3B6ZGRpdGtidXp6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI2NDY5MzMsImV4cCI6MjA4ODIyMjkzM30.mwWcvrNrnLO_EjgbY9V1Ozdcfs9SBk0S4nWKxagiuUU';
        const db = supabase.createClient(supabaseUrl, supabaseKey);

        function toggleVisibility(inputId) {
            const input = document.getElementById(inputId);
            input.type = input.type === "password" ? "text" : "password";
        }

        // --- LÓGICA DO TEMPORIZADOR DE REENVIO ---
        let resendInterval;
        const resendBtn = document.getElementById('resendBtn');

        function startResendTimer(seconds) {
            clearInterval(resendInterval);
            resendBtn.disabled = true;
            let timeLeft = seconds;

            function updateBtnText() {
                const m = Math.floor(timeLeft / 60).toString().padStart(2, '0');
                const s = (timeLeft % 60).toString().padStart(2, '0');
                resendBtn.textContent = `Reenviar em ${m}:${s}`;
            }

            updateBtnText();
            timeLeft--;

            resendInterval = setInterval(() => {
                if (timeLeft < 0) {
                    clearInterval(resendInterval);
                    resendBtn.disabled = false;
                    resendBtn.textContent = 'Reenviar Código';
                } else {
                    updateBtnText();
                    timeLeft--;
                }
            }, 1000);
        }

        resendBtn.addEventListener('click', async () => {
            if (resendBtn.disabled) return;
            const email = document.getElementById('loginEmail').value;

            resendBtn.textContent = 'A enviar...';
            resendBtn.disabled = true;

            try {
                const { error } = await db.auth.signInWithOtp({ email: email });
                if (error) {
                    showToast(error.message, 'error');
                    resendBtn.textContent = 'Reenviar Código';
                    resendBtn.disabled = false;
                } else {
                    showToast('Novo código enviado! Verifica o e-mail.', 'success');
                    startResendTimer(120);
                }
            } catch (err) {
                showToast('Erro ao reenviar o código.', 'error');
                resendBtn.textContent = 'Reenviar Código';
                resendBtn.disabled = false;
            }
        });

        // --- LÓGICA DAS CAIXINHAS DO CÓDIGO (8 DIGITOS) ---
        const otpBoxes = document.querySelectorAll('.otp-box');
        const hiddenOtpInput = document.getElementById('otpCode');

        function updateHiddenOtp() {
            let code = '';
            otpBoxes.forEach(box => code += box.value);
            hiddenOtpInput.value = code;

            // NOVA LÓGICA: Submissão automática mal os 8 dígitos estejam preenchidos!
            if (code.length === 8) {
                const submitBtn = document.getElementById('submitBtn');
                if (!submitBtn.disabled) {
                    processarMFA(code); // Chama diretamente a validação, ignorando o formulário HTML
                }
            }
        }

        otpBoxes.forEach((box, index) => {
            box.addEventListener('input', (e) => {
                box.value = box.value.replace(/[^0-9]/g, ''); // Só números

                if (box.value.length === 1 && index < otpBoxes.length - 1) {
                    otpBoxes[index + 1].focus();
                }
                updateHiddenOtp();
            });

            box.addEventListener('keydown', (e) => {
                if (e.key === 'Backspace' && box.value === '' && index > 0) {
                    otpBoxes[index - 1].focus();
                }
            });

            box.addEventListener('paste', (e) => {
                e.preventDefault();
                // Limita a colagem para exatamente 8 dígitos
                const pastedData = e.clipboardData.getData('text').replace(/[^0-9]/g, '').slice(0, 8);

                if (pastedData) {
                    for (let i = 0; i < pastedData.length; i++) {
                        if (otpBoxes[index + i]) {
                            otpBoxes[index + i].value = pastedData[i];
                        }
                    }
                    const lastFilledIndex = Math.min(index + pastedData.length - 1, otpBoxes.length - 1);
                    otpBoxes[lastFilledIndex].focus();
                    updateHiddenOtp();
                }
            });
        });

        // --- FUNÇÃO ISOLADA PARA PROCESSAR O MFA (Evita problemas com o Google Login) ---
        async function processarMFA(code) {
            const email = document.getElementById('loginEmail').value;
            const submitBtn = document.getElementById('submitBtn');

            if (code.length < 8) {
                showToast('Por favor, insere os 8 dígitos.', 'error');
                return;
            }

            submitBtn.textContent = "A validar...";
            submitBtn.disabled = true;

            try {
                const response = await fetch('/api/verify-otp', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, code })
                });
                const data = await response.json();

                if (response.ok) {
                    sessionStorage.setItem('showLoginToast', 'true');
                    window.location.href = 'quizzes'; // Redirecionamento direto
                } else {
                    showToast(data.error || 'Código inválido.', 'error');
                    // Limpar as caixas em caso de erro
                    otpBoxes.forEach(box => box.value = '');
                    hiddenOtpInput.value = '';
                    otpBoxes[0].focus();
                    submitBtn.textContent = "Validar Código";
                    submitBtn.disabled = false;
                }
            } catch (err) {
                showToast('Erro de ligação ao servidor.', 'error');
                submitBtn.textContent = "Validar Código";
                submitBtn.disabled = false;
            }
        }

        // --- FUNÇÃO PARA MUDAR A INTERFACE PARA O PASSO DE MFA ---
        let currentStep = 1;
        function transitionToMFA(email) {
            document.getElementById('loginEmail').value = email;

            // Esconder os passos iniciais
            document.getElementById('emailGroup').style.display = 'none';
            document.getElementById('passwordGroup').style.display = 'none';
            document.getElementById('extraLinks').style.display = 'none';

            // CORREÇÃO CRUCIAL: Remover a validação dos campos invisíveis
            document.getElementById('loginEmail').required = false;
            document.getElementById('loginPassword').required = false;

            // Mostrar a parte do código
            document.getElementById('formSubtitle').textContent = "Verificação de Segurança";
            document.getElementById('mfaInstructions').style.display = 'block';
            document.getElementById('codeGroup').style.display = 'block';
            document.getElementById('resendContainer').style.display = 'block';

            otpBoxes[0].focus();
            startResendTimer(120);
            currentStep = 2;

            const submitBtn = document.getElementById('submitBtn');
            submitBtn.textContent = "Validar Código";
            submitBtn.disabled = false;
            // Mudar o botão para "button" para não tentar submeter o formulário ignorando o JS
            submitBtn.type = "button";
        }

        // --- EVENTO DE CLIQUE DO BOTÃO PRINCIPAL ---
        document.getElementById('submitBtn').addEventListener('click', async (e) => {
            // Se ainda for tipo 'submit', evitamos o comportamento padrão para gerir nós o processo
            if (document.getElementById('submitBtn').type === "submit") {
                e.preventDefault();
            }

            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            const code = document.getElementById('otpCode').value;
            const submitBtn = document.getElementById('submitBtn');

            // PASSO 1: LOGIN COM EMAIL E PASSWORD
            if (currentStep === 1) {
                if (!email || !password) {
                    showToast('Por favor, preenche todos os campos.', 'error');
                    return;
                }

                submitBtn.textContent = "A verificar...";
                submitBtn.disabled = true;

                try {
                    const response = await fetch('/api/login', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ email, password })
                    });
                    const data = await response.json();

                    if (response.ok) {
                        if (data.step === 'mfa') {
                            showToast('Código enviado para o e-mail!', 'success');
                            transitionToMFA(data.email);
                        } else if (data.step === 'done') {
                            sessionStorage.setItem('showLoginToast', 'true');
                            window.location.href = 'quizzes'; // Redirecionamento direto
                        }
                    } else {
                        showToast(data.error || 'Erro no login.', 'error');
                        submitBtn.textContent = "Entrar";
                        submitBtn.disabled = false;
                    }
                } catch (err) {
                    showToast('Erro de ligação ao servidor.', 'error');
                    submitBtn.textContent = "Entrar";
                    submitBtn.disabled = false;
                }
            }

            // PASSO 2: VALIDAR O CÓDIGO MFA (Caso o utilizador clique no botão em vez de esperar pelo auto-submit)
            else if (currentStep === 2) {
                processarMFA(code);
            }
        });

        // --- GOOGLE LOGIN ---
        window.onload = function () {
            google.accounts.id.initialize({
                client_id: "865272573225-lv2lfndmf2cvhsu7v63av77v8lq1au5u.apps.googleusercontent.com",
                callback: handleGoogleResponse
            });
            const gBtnEl = document.getElementById("g_id_signin");
            const gBtnWidth = Math.min(300, gBtnEl.parentElement.offsetWidth - 4);
            google.accounts.id.renderButton(
                gBtnEl,
                { theme: "filled_black", size: "large", width: gBtnWidth.toString(), text: "signin_with", shape: "pill" }
            );
        };

        async function handleGoogleResponse(googleData) {
            try {
                const response = await fetch('/api/google-login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    // NOVO: Enviamos a action 'login'
                    body: JSON.stringify({ token: googleData.credential, action: 'login' })
                });
                const data = await response.json();

                if (response.ok) {
                    if (data.step === 'mfa') {
                        showToast('MFA Ativo. Verifica o teu e-mail!', 'success');
                        transitionToMFA(data.email);
                    } else if (data.step === 'done') {
                        sessionStorage.setItem('showLoginToast', 'true');
                        window.location.href = 'quizzes'; // Redirecionamento direto
                    }
                } else {
                    // Se o servidor disser que a conta não existe, redireciona para o registo
                    showToast(data.error || "Falha na autenticação Google", "error");
                    if (data.redirectToRegister) {
                        setTimeout(() => {
                            window.location.href = 'register';
                        }, 2500); // Dá tempo para a pessoa ler o balão de erro e depois muda a página
                    }
                }
            } catch (err) { showToast("Erro de ligação.", "error"); }
        }
    </script>
</body>

</html>
