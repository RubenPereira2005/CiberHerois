<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - CiberHeróis</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="dark-mode.css">
    <link rel="stylesheet" href="google.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="theme.js"></script>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <style>
        .divider-container {
            display: flex; align-items: center; text-align: center; margin: 20px 0;
        }
        .divider-line { flex: 1; height: 1px; background: #e2e8f0; }
        .divider-text { margin: 0 10px; color: #64748b; font-size: 0.875rem; }
    </style>
</head>
<body class="login-page">

    <div id="toast-container" class="toast-container">
        <div class="toast-content">
            <i id="toast-icon-element" data-lucide="alert-circle" class="toast-icon"></i>
            <span id="toast-message-element" class="toast-message">Mensagem de aviso</span>
        </div>
        <div class="toast-progress"></div>
    </div>

    <div class="login-wrapper">
        <div class="login-box">
            <div class="login-header">
                <h2 class="login-title">CiberHeróis</h2>
            </div>

            <h3 class="login-subtitle">Iniciar Sessão</h3>
            
            <form id="loginForm" class="login-form">
                <div class="form-group">
                    <label class="form-label">Email</label>
                    <input type="email" id="loginEmail" required class="form-input" placeholder="exemplo@email.com" />
                </div>

                <div class="form-group">
                    <label class="form-label">Password</label>
                    <div class="password-input-wrapper">
                        <input type="password" id="loginPassword" required class="form-input" placeholder="••••••••" />
                        <button type="button" onclick="togglePassword()" class="password-toggle-btn">
                            <i data-lucide="eye" id="eyeIcon" class="icon-eye"></i>
                        </button>
                    </div>
                </div>
                <a href="forgot-password.html" class="forgot-password-link">Esqueci-me da palavra-passe</a>

                <button type="submit" class="login-btn">Entrar</button>

                <div class="divider-container">
                    <span class="divider-line"></span>
                    <span class="divider-text">ou continuar com</span>
                    <span class="divider-line"></span>
                </div>
                
                <div id="googleBtnContainer" style="display: flex; justify-content: center; margin-bottom: 15px;">
                    <div id="g_id_signin"></div>
                </div>

                <p class="login-link">
                    Não tem uma conta? <a href="register.html" class="link-highlight">Criar conta</a>
                </p>

                <p class="back-link">
                    <i data-lucide="arrow-left"></i>
                    <a href="index.html" class="link-highlight">Voltar à página inicial</a>
                </p>
            </form>
        </div>
    </div>

<script>
        lucide.createIcons();

        // Configuração do Toast
        const toastContainer = document.getElementById('toast-container');
        const toastMessage = document.getElementById('toast-message-element');
        const toastIcon = document.getElementById('toast-icon-element');

        function showToast(mensagem, tipo = 'error') {
            toastMessage.textContent = mensagem;
            toastContainer.className = `toast-container active ${tipo}`;

            const iconName = tipo === 'success' ? 'check-circle' : 'alert-circle';
            toastIcon.setAttribute('data-lucide', iconName);
            lucide.createIcons();

            setTimeout(() => {
                toastContainer.classList.remove('active');
            }, 3300); // O balão desaparece após 3.3 segundos
        }

        function togglePassword() {
            const input = document.getElementById('loginPassword');
            input.type = input.type === "password" ? "text" : "password";
        }

        // LOGIN TRADICIONAL (Email e Password)
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;

            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const data = await response.json(); 

                if (response.ok) {
                    sessionStorage.setItem('showLoginToast', 'true'); 

                    // Lógica de redirecionamento baseada na role do utilizador
                    if (data.role === 'admin') {
                        window.location.href = 'gestao.html';
                    } else {
                        window.location.href = 'dashboard.html';
                    }
                } else {
                    showToast(data.error || "Email ou palavra-passe incorretos.", 'error');
                }
            } catch (err) {
                showToast("Erro de conexão com o servidor.", 'error');
            }
        });

        // LOGIN COM GOOGLE
        window.onload = function () {
            google.accounts.id.initialize({
                client_id: "865272573225-lv2lfndmf2cvhsu7v63av77v8lq1au5u.apps.googleusercontent.com", 
                callback: handleGoogleResponse
            });

            google.accounts.id.renderButton(
                document.getElementById("g_id_signin"),
                { 
                    theme: "filled_black",   
                    size: "large",           
                    width: "300",            
                    text: "continue_with",   
                    shape: "pill"            
                }
            );
        };

        // Processar a resposta do Google
        async function handleGoogleResponse(googleData) {
            try {
                const response = await fetch('/api/google-login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token: googleData.credential, action: 'login' }) 
                });

                const data = await response.json();

                if (response.ok) {
                    // Sucesso!
                    sessionStorage.setItem('showLoginToast', 'true');
                    
                    // Redirecionar com base na role do utilizador
                    if (data.role === 'admin') {
                        window.location.href = 'gestao.html';
                    } else {
                        window.location.href = 'dashboard.html';
                    }
                } else {
                    showToast(data.error || "Erro ao entrar com o Google", "error");

                    if (data.redirect) {
                        setTimeout(() => {
                            window.location.href = 'register.html';
                        }, 3000); 
                    }
                }
            } catch (err) {
                showToast("Erro de ligação ao servidor", "error");
            }
        }
    </script>
</body>
</html>
