<!DOCTYPE html>
<html lang="pt">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz - CiberHeróis</title>
    <link rel="icon" type="image/x-icon" href="img/favicon.svg">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="dark-mode.css">
    <link rel="stylesheet" href="preloader.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="global-init.js"></script>
    <script src="theme.js"></script>
    <style>
        /* Animação para o botão da IA */
        @keyframes spin-fast { 100% { transform: rotate(360deg); } }
        .spin-icon { animation: spin-fast 1s linear infinite; }
    </style>
</head>

<body class="quiz-page-body">

    <div id="global-loader">
        <div class="loader-logo">Ciber<span>Heróis</span></div>
        <div class="loader-spinner"></div>
    </div>

    <div id="includedContent"></div>

    <div id="stars-container" class="stars-container"></div>

    <div id="quiz-ui" class="quiz-play-container">
        <div class="quiz-play-header">
            <div class="quiz-play-stats">
                <span id="question-counter">A carregar questões...</span>
                <span id="score-counter">XP Acumulado: 0</span>
            </div>
            <div class="quiz-progress-track">
                <div id="progress-bar" class="quiz-progress-fill" style="width: 0%;"></div>
            </div>
        </div>

        <div class="quiz-question-box">
            <h2 id="question-text" class="quiz-question-text">A ligar à Base de Dados...</h2>

            <div id="options-container" class="quiz-options-container">
            </div>

            <div id="ai-mentor-box" class="quiz-hidden" style="margin-top: 20px; padding: 15px; background: rgba(59, 130, 246, 0.1); border-left: 4px solid #3b82f6; border-radius: 8px;">
                <div style="display: flex; align-items: center; gap: 10px; margin-bottom: 10px;">
                    <i data-lucide="bot" style="color: #3b82f6;"></i>
                    <h3 style="margin: 0; color: #3b82f6; font-size: 1rem;">Ciber-Mentor IA</h3>
                </div>
                <button id="ask-ai-btn" class="btn btn-secondary btn-sm" onclick="pedirDicaIA()" style="display: flex; align-items: center; gap: 6px;">
                    <i data-lucide="sparkles" style="width: 16px; height: 16px;"></i> Pedir Análise à IA
                </button>
                <p id="ai-response-text" style="margin-top: 10px; font-size: 0.95rem; line-height: 1.5; color: var(--text-color); display: none;"></p>
            </div>
            <button id="next-btn" onclick="nextQuestion()" class="btn btn-primary quiz-next-btn quiz-hidden" style="margin-top: 15px;">
                Próxima Questão
            </button>
        </div>
    </div>

    <div id="results-ui" class="quiz-results-overlay quiz-hidden">
        <div class="quiz-results-card">
            <div id="result-icon" class="quiz-results-icon"></div>

            <h2 class="quiz-results-title">Quiz Completo!</h2>
            <p id="result-text" class="quiz-results-text">Acertou X de Y questões</p>

            <div class="quiz-results-score-box">
                <p id="result-points" class="quiz-results-score-text">Ganhou 0 pontos!</p>
            </div>

            <p id="perfect-score-msg" class="quiz-perfect-msg quiz-hidden">
                🎉 Pontuação Perfeita!
            </p>

            <div class="quiz-results-actions">
                <button onclick="window.location.href='quizzes'" class="btn btn-primary">
                    Voltar aos quizzes
                </button>
                <button onclick="window.location.href='profile'" class="btn btn-secondary">
                    Ver Perfil
                </button>
            </div>
        </div>
    </div>

    <script>
        // ==========================================
        // SETUP DO JOGO & LEITURA DO URL
        // ==========================================
        const urlParams = new URLSearchParams(window.location.search);
        const category = urlParams.get('cat') || 'https';
        const difficulty = urlParams.get('diff') || 'medio'; 

        let questions = [];
        let currentQIndex = 0;
        let score = 0;
        let totalPontosGanhos = 0;
        let answered = false;

        // Variáveis para guardar o contexto para a IA
        let ultimaPerguntaTexto = "";
        let ultimaRespostaErradaTexto = "";

        // Função para baralhar as opções de resposta
        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        async function loadQuizData() {
            try {
                const response = await fetch(`/api/quiz/${category}?diff=${difficulty}`);
                if (!response.ok) throw new Error('Erro na resposta da API');

                questions = await response.json();

                questions.forEach(q => {
                    if (q.options) {
                        q.options = shuffleArray(q.options);
                    }
                });

                renderQuestion();
            } catch (error) {
                console.error("Erro:", error);
                document.getElementById('question-text').textContent = "Não existem perguntas para esta dificuldade ainda!";
                document.getElementById('question-counter').textContent = "Erro";
            }
        }

        function renderQuestion() {
            if (questions.length === 0) return;

            // Esconde a caixa da IA ao desenhar uma nova pergunta
            document.getElementById('ai-mentor-box').classList.add('quiz-hidden');

            const q = questions[currentQIndex];

            let diffText = difficulty === 'facil' ? '🟢 Fácil' : difficulty === 'medio' ? '🟡 Médio' : '🔴 Difícil';
            document.getElementById('question-counter').textContent = `Questão ${currentQIndex + 1} de ${questions.length} | ${diffText}`;
            document.getElementById('score-counter').textContent = `XP Acumulado: ${totalPontosGanhos}`;
            document.getElementById('progress-bar').style.width = `${((currentQIndex + 1) / questions.length) * 100}%`;
            document.getElementById('question-text').textContent = q.question;
            document.getElementById('next-btn').classList.add('quiz-hidden');

            const optionsContainer = document.getElementById('options-container');
            optionsContainer.innerHTML = '';

            q.options.forEach((opt, index) => {
                const letras = ['A', 'B', 'C', 'D', 'E'];
                const btn = document.createElement('button');
                btn.className = `quiz-option-btn`;
                btn.innerHTML = `<span class="quiz-option-label">${letras[index]})</span> ${opt.text}`;

                btn.dataset.isCorrect = (opt.id == q.correctAnswer) ? "true" : "false";
                btn.onclick = () => handleAnswer(btn, opt.id, q.correctAnswer);

                optionsContainer.appendChild(btn);
            });

            answered = false;
        }

        function handleAnswer(btn, selectedId, correctId) {
            if (answered) return;
            answered = true;

            const isCorrect = (selectedId == correctId);
            const q = questions[currentQIndex];

            // Guarda a pergunta para a IA
            ultimaPerguntaTexto = q.question;

            if (isCorrect) {
                score++;
                const pontosDaPergunta = q.pontos || 10;
                totalPontosGanhos += pontosDaPergunta; 
            }

            const buttons = document.getElementById('options-container').children;
            for (let b of buttons) {
                b.disabled = true;
                
                if (b.dataset.isCorrect === "true") {
                    b.classList.add('correct');
                }
                
                if (b === btn && !isCorrect) {
                    b.classList.add('wrong');
                    // Tira o "A) " da frente para a IA ter o texto limpo
                    ultimaRespostaErradaTexto = b.textContent.substring(3).trim();
                    
                    // Mostra o botão para pedir ajuda à IA!
                    document.getElementById('ai-mentor-box').classList.remove('quiz-hidden');
                    document.getElementById('ask-ai-btn').style.display = 'flex';
                    // Reset do botão se ele já tiver sido usado numa pergunta anterior
                    document.getElementById('ask-ai-btn').innerHTML = '<i data-lucide="sparkles" style="width: 16px; height: 16px;"></i> Pedir Análise à IA';
                    document.getElementById('ask-ai-btn').disabled = false;
                    document.getElementById('ai-response-text').style.display = 'none';
                    if (typeof lucide !== 'undefined') lucide.createIcons();
                }
            }

            document.getElementById('score-counter').textContent = `XP Acumulado: ${totalPontosGanhos}`;

            const nextBtn = document.getElementById('next-btn');
            nextBtn.textContent = currentQIndex < questions.length - 1 ? 'Próxima Questão' : 'Ver Resultados';
            nextBtn.classList.remove('quiz-hidden');
        }

        // --- FUNÇÃO QUE CHAMA A INTELIGÊNCIA ARTIFICIAL ---
        async function pedirDicaIA() {
            const btnAI = document.getElementById('ask-ai-btn');
            const respostaTxt = document.getElementById('ai-response-text');
            
            // Estado de "A pensar..."
            btnAI.innerHTML = '<i data-lucide="loader" class="spin-icon" style="width:16px; height:16px;"></i> A analisar resposta...';
            btnAI.disabled = true;
            lucide.createIcons();

            try {
                const response = await fetch('/api/quiz/hint', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        pergunta: ultimaPerguntaTexto,
                        respostaErrada: ultimaRespostaErradaTexto
                    })
                });

                const data = await response.json();
                
                // Esconde o botão e mostra o texto gerado
                btnAI.style.display = 'none'; 
                respostaTxt.style.display = 'block'; 
                
                if (response.ok) {
                    respostaTxt.innerHTML = `<strong>Dica do Mentor:</strong> ${data.hint}`;
                } else {
                    respostaTxt.innerHTML = `<em>${data.error}</em>`;
                }
            } catch (error) {
                btnAI.style.display = 'none';
                respostaTxt.style.display = 'block';
                respostaTxt.innerHTML = `<em>Erro de ligação ao quartel-general da IA. Tenta mais tarde.</em>`;
            }
        }

        function nextQuestion() {
            if (currentQIndex < questions.length - 1) {
                currentQIndex++;
                renderQuestion();
            } else {
                showResults();
            }
        }

        async function showResults() {
            document.getElementById('quiz-ui').classList.add('quiz-hidden');
            document.getElementById('results-ui').classList.remove('quiz-hidden');

            const percentage = (score / questions.length) * 100;

            const iconContainer = document.getElementById('result-icon');
            if (percentage === 100) {
                iconContainer.innerHTML = '<i data-lucide="trophy" style="width: 80px; height: 80px; color: #eab308; stroke-width: 1.5;"></i>';
                document.getElementById('perfect-score-msg').classList.remove('quiz-hidden');
            } else if (percentage >= 70) {
                iconContainer.innerHTML = '<i data-lucide="award" style="width: 80px; height: 80px; color: #3b82f6; stroke-width: 1.5;"></i>';
            } else {
                iconContainer.innerHTML = '<i data-lucide="x-circle" style="width: 80px; height: 80px; color: #9ca3af; stroke-width: 1.5;"></i>';
            }

            document.getElementById('result-text').textContent = `Acertou ${score} de ${questions.length} questões`;
            document.getElementById('result-points').textContent = `A calcular recompensas...`;

            if (typeof lucide !== 'undefined') lucide.createIcons();

            try {
                const response = await fetch('/api/quiz/save-score', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        categoria: category,
                        dificuldade: difficulty,
                        respostas_corretas: score,
                        total_perguntas: questions.length
                    })
                });

                if (response.ok) {
                    const data = await response.json();
                    if (data.moedas_ganhas && data.moedas_ganhas > 0) {
                        document.getElementById('result-points').innerHTML = `Ganhou <strong>${data.pontos_ganhos} XP</strong> e <strong>${data.moedas_ganhas} CiberCoins</strong>! 🪙`;
                    } else {
                        document.getElementById('result-points').innerHTML = `Ganhou <strong>${data.pontos_ganhos} XP</strong>!`;
                    }
                } else {
                    document.getElementById('result-points').innerHTML = `Ganhou <strong>${totalPontosGanhos} XP</strong>! <br><small>(Erro ao guardar no Servidor)</small>`;
                }
            } catch (erro) {
                document.getElementById('result-points').innerHTML = `Ganhou <strong>${totalPontosGanhos} XP</strong>! <br><small>(Modo Offline/Sem Rede)</small>`;
            }
        }

        // Efeitos visuais
        const starsContainer = document.getElementById('stars-container');
        if (starsContainer) {
            for (let i = 0; i < 30; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                star.style.width = Math.random() * 3 + 'px';
                star.style.height = star.style.width;
                star.style.left = Math.random() * 100 + '%';
                star.style.top = Math.random() * 100 + '%';
                star.style.animationDelay = Math.random() * 3 + 's';
                starsContainer.appendChild(star);
            }
        }

        if (typeof lucide !== 'undefined') lucide.createIcons();

        loadQuizData();
    </script>
</body>

</html>
