<!DOCTYPE html>
<html lang="pt">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz - CiberHeróis</title>
    <link rel="icon" type="image/x-icon" href="img/favicon.svg">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="dark-mode.css">
    <link rel="stylesheet" href="preloader.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="global-init.js"></script>
    <script src="theme.js"></script>
</head>

<body class="quiz-page-body">

    <div id="global-loader">
        <div class="loader-logo">Ciber<span>Heróis</span></div>
        <div class="loader-spinner"></div>
    </div>

    <div id="includedContent"></div>

    <div id="stars-container" class="stars-container"></div>

    <div id="quiz-ui" class="quiz-play-container">
        <div class="quiz-play-header">
            <div class="quiz-play-stats">
                <span id="question-counter">A carregar questões...</span>
                <span id="score-counter">Pontuação: 0</span>
            </div>
            <div class="quiz-progress-track">
                <div id="progress-bar" class="quiz-progress-fill" style="width: 0%;"></div>
            </div>
        </div>

        <div class="quiz-question-box">
            <h2 id="question-text" class="quiz-question-text">A ligar à Base de Dados...</h2>

            <div id="options-container" class="quiz-options-container">
            </div>

            <button id="next-btn" onclick="nextQuestion()" class="btn btn-primary quiz-next-btn quiz-hidden">
                Próxima Questão
            </button>
        </div>
    </div>

    <div id="results-ui" class="quiz-results-overlay quiz-hidden">
        <div class="quiz-results-card">
            <div id="result-icon" class="quiz-results-icon"></div>

            <h2 class="quiz-results-title">Quiz Completo!</h2>
            <p id="result-text" class="quiz-results-text">Acertou X de Y questões</p>

            <div class="quiz-results-score-box">
                <p id="result-points" class="quiz-results-score-text">Ganhou 0 pontos!</p>
            </div>

            <p id="perfect-score-msg" class="quiz-perfect-msg quiz-hidden">
                🎉 Pontuação Perfeita!
            </p>

            <div class="quiz-results-actions">
                <button onclick="window.location.href='quizzes.html'" class="btn btn-primary">
                    Voltar ao quizzes
                </button>
                <button onclick="window.location.href='profile.html'" class="btn btn-secondary">
                    Ver Perfil
                </button>
            </div>
        </div>
    </div>

    <script>
        // SETUP DO JOGO
        const urlParams = new URLSearchParams(window.location.search);
        const category = urlParams.get('cat') || 'https';

        let questions = [];
        let currentQIndex = 0;
        let score = 0;
        let totalPontosGanhos = 0;
        let answered = false;

        // Função para baralhar apenas as opções de resposta
        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        // Função que comunica com a API para obter as questões
        async function loadQuizData() {
            try {
                const response = await fetch(`/api/quiz/${category}`);

                if (!response.ok) throw new Error('Erro na resposta da API');

                questions = await response.json();

                // Baralhar apenas as opções
                questions.forEach(q => {
                    if (q.options) {
                        q.options = shuffleArray(q.options);
                    }
                });

                renderQuestion();

            } catch (error) {
                console.error("Erro:", error);
                document.getElementById('question-text').textContent = "Erro ao carregar o quiz da Base de Dados.";
                document.getElementById('question-counter').textContent = "Erro";
            }
        }

        function renderQuestion() {
            if (questions.length === 0) return;

            const q = questions[currentQIndex];

            // Mostrar em que nível de dificuldade estamos
            let diffText = q.dificuldade === 'facil' ? '🟢 Fácil' : q.dificuldade === 'medio' ? '🟡 Médio' : '🔴 Difícil';

            document.getElementById('question-counter').textContent = `Questão ${currentQIndex + 1} de ${questions.length} | ${diffText}`;
            document.getElementById('score-counter').textContent = `XP Acumulado: ${totalPontosGanhos}`; // Atualizado para mostrar XP
            document.getElementById('progress-bar').style.width = `${((currentQIndex + 1) / questions.length) * 100}%`;
            document.getElementById('question-text').textContent = q.question;

            document.getElementById('next-btn').classList.add('quiz-hidden');

            const optionsContainer = document.getElementById('options-container');
            optionsContainer.innerHTML = '';

            q.options.forEach((opt, index) => {
                const letras = ['A', 'B', 'C', 'D', 'E'];
                const btn = document.createElement('button');
                btn.className = `quiz-option-btn`;
                btn.innerHTML = `<span class="quiz-option-label">${letras[index]})</span> ${opt.text}`;

                btn.dataset.isCorrect = (opt.id == q.correctAnswer) ? "true" : "false";
                btn.onclick = () => handleAnswer(btn, opt.id, q.correctAnswer);

                optionsContainer.appendChild(btn);
            });

            answered = false;
        }

        function handleAnswer(btn, selectedId, correctId) {
            if (answered) return;
            answered = true;

            const isCorrect = (selectedId == correctId);
            if (isCorrect) {
                score++;

                // === LÓGICA DE PONTOS POR DIFICULDADE ===
                const dificuldade = questions[currentQIndex].dificuldade;
                if (dificuldade === 'facil') {
                    totalPontosGanhos += 10;
                } else if (dificuldade === 'medio') {
                    totalPontosGanhos += 20;
                } else if (dificuldade === 'dificil') {
                    totalPontosGanhos += 30;
                } else {
                    totalPontosGanhos += 10; // Valor por defeito
                }
            }

            const buttons = document.getElementById('options-container').children;
            for (let b of buttons) {
                b.disabled = true;

                if (b.dataset.isCorrect === "true") {
                    b.classList.add('correct');
                }

                if (b === btn && !isCorrect) {
                    b.classList.add('wrong');
                }
            }

            // Atualiza o contador de XP imediatamente no ecrã para dar feedback ao utilizador
            document.getElementById('score-counter').textContent = `XP Acumulado: ${totalPontosGanhos}`;

            const nextBtn = document.getElementById('next-btn');
            nextBtn.textContent = currentQIndex < questions.length - 1 ? 'Próxima Questão' : 'Ver Resultados';
            nextBtn.classList.remove('quiz-hidden');
        }

        function nextQuestion() {
            if (currentQIndex < questions.length - 1) {
                currentQIndex++;
                renderQuestion();
            } else {
                showResults();
            }
        }

        async function showResults() {
            document.getElementById('quiz-ui').classList.add('quiz-hidden');
            document.getElementById('results-ui').classList.remove('quiz-hidden');

            const percentage = (score / questions.length) * 100;

            const iconContainer = document.getElementById('result-icon');
            if (percentage === 100) {
                iconContainer.innerHTML = '<i data-lucide="trophy"  style="width: 80px; height: 80px; color: #eab308; stroke-width: 1.5;"></i>';
                document.getElementById('perfect-score-msg').classList.remove('quiz-hidden');
            } else if (percentage >= 70) {
                iconContainer.innerHTML = '<i data-lucide="award"  style="width: 80px; height: 80px; color: #3b82f6; stroke-width: 1.5;"></i>';
            } else {
                iconContainer.innerHTML = '<i data-lucide="x-circle"  style="width: 80px; height: 80px; color: #9ca3af; stroke-width: 1.5;"></i>';
            }

            document.getElementById('result-text').textContent = `Acertou ${score} de ${questions.length} questões`;
            document.getElementById('result-points').textContent = `A calcular recompensas...`;

            if (typeof lucide !== 'undefined') {
                lucide.createIcons();
            }

            // --- ENVIAR XP PARA A DB E RECEBER MOEDAS ---
            try {
                const response = await fetch('/api/quiz/save-score', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        categoria: category,
                        pontos: totalPontosGanhos, // Usa os pontos calculados pela dificuldade
                        respostas_corretas: score,
                        total_perguntas: questions.length
                    })
                });

                if (response.ok) {
                    const data = await response.json();
                    console.log("Sucesso:", data.message);

                    // Mostra o XP e as CiberCoins geradas no backend!
                    if (data.moedas_ganhas && data.moedas_ganhas > 0) {
                        document.getElementById('result-points').innerHTML = `Ganhou <strong>${totalPontosGanhos} XP</strong> e <strong>${data.moedas_ganhas} CiberCoins</strong>! 🪙`;
                    } else {
                        document.getElementById('result-points').innerHTML = `Ganhou <strong>${totalPontosGanhos} XP</strong>!`;
                    }
                } else {
                    console.error("Falha ao guardar a pontuação no servidor.");
                    document.getElementById('result-points').innerHTML = `Ganhou <strong>${totalPontosGanhos} XP</strong>! <br><small>(Modo Offline/Erro de Servidor)</small>`;
                }
            } catch (erro) {
                console.error("Erro de rede ao tentar guardar a pontuação:", erro);
                document.getElementById('result-points').innerHTML = `Ganhou <strong>${totalPontosGanhos} XP</strong>! <br><small>(Modo Offline/Erro de Rede)</small>`;
            }
        }

        // Efeitos visuais
        const starsContainer = document.getElementById('stars-container');
        if (starsContainer) {
            for (let i = 0; i < 30; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                star.style.width = Math.random() * 3 + 'px';
                star.style.height = star.style.width;
                star.style.left = Math.random() * 100 + '%';
                star.style.top = Math.random() * 100 + '%';
                star.style.animationDelay = Math.random() * 3 + 's';
                starsContainer.appendChild(star);
            }
        }

        if (typeof lucide !== 'undefined') {
            lucide.createIcons();
        }

        loadQuizData();
    </script>
</body>
</html>
